"$schema" = "https://starship.rs/config-schema.json"

# Compact two-line prompt with Catppuccin Mocha colors.
format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$nodejs\
$bun\
$dart\
$python\
$golang\
$rust\
$java\
$kotlin\
$lua\
$php\
$nix_shell\
$aws\
$azure\
$docker_context\
$kubernetes\
$cmd_duration\
$time\
\n$character\
"""

add_newline = true
scan_timeout = 30
command_timeout = 1000
palette = "catppuccin_mocha"

[fill]
symbol = " "

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold fg:lavender"
style_root = "bold fg:red"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold fg:sky"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold fg:blue"
read_only_style = "bold fg:red"
read_only = " ¾░īŠ"
truncation_length = 2
truncation_symbol = "ŌĆ”/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "
"Projects" = "¾░▓ŗ "

[git_branch]
format = "-> [$symbol$branch]($style) "
style = "bold fg:mauve"
symbol = "’Éś "

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "fg:yellow"
conflicted = "Ņ£¦${count} "
ahead = "ŌćĪ${count} "
behind = "ŌćŻ${count} "
diverged = "ŌćĢ${ahead_count}/${behind_count} "
untracked = "?${count} "
stashed = 'ŌēĪ${count} '
modified = "!${count} "
staged = "+${count} "
renamed = "┬╗${count} "
deleted = "Ō£ś${count} "

[git_state]
format = "[$state( $progress_current/$progress_total)]($style) "
style = "fg:peach"

[nodejs]
symbol = "Ņ£ś "
format = "[$symbol($version)](fg:green) "
version_format = "$raw"

[bun]
symbol = "ŅØ» "
format = "[$symbol($version)](fg:peach) "
version_format = "$raw"

[dart]
symbol = "Ņ×ś "
format = "[$symbol($version)](fg:sky) "
version_format = "$raw"

[python]
symbol = "ŅłĄ "
format = "[$symbol$pyenv_prefix($version)( $virtualenv)](fg:yellow) "
version_format = "$raw"

[golang]
symbol = "Ņś¦ "
format = "[$symbol($version)](fg:sky) "
version_format = "$raw"

[rust]
symbol = "¾▒śŚ "
format = "[$symbol($version)](fg:peach) "
version_format = "$raw"

[java]
symbol = "Ņē¢ "
format = "[$symbol($version)](fg:red) "
version_format = "$raw"

[kotlin]
symbol = "Ņś┤ "
format = "[$symbol($version)](fg:mauve) "
version_format = "$raw"

[lua]
symbol = "ŅśĀ "
format = "[$symbol($version)](fg:blue) "
version_format = "$raw"

[php]
symbol = "Ņśł "
format = "[$symbol($version)](fg:mauve) "
version_format = "$raw"

[nix_shell]
symbol = "’īō "
format = "[$symbol$state( $name)](fg:lavender) "

[aws]
symbol = "ŅīĮ  "
format = "[$symbol($profile)(@$region)](fg:peach) "

[azure]
symbol = "¾░Āģ "
format = "[$symbol($subscription)](fg:blue) "

[docker_context]
symbol = "’īł "
format = "[$symbol$context](fg:sky) "

[kubernetes]
symbol = "¾▒āŠ "
format = "[$symbol$context(::$namespace)](fg:teal) "
disabled = false

[cmd_duration]
format = "took [$duration]($style) "
style = "bold fg:yellow"
min_time = 500

[time]
disabled = false
time_format = "%R"
format = "[’ĆŚ $time](fg:subtext0)"

[character]
success_symbol = "[ŌØ»](bold fg:green)"
error_symbol = "[ŌØ»](bold fg:red)"
vimcmd_symbol = "[ŌØ«](bold fg:green)"
vimcmd_replace_one_symbol = "[R](bold fg:peach)"
vimcmd_visual_symbol = "[V](bold fg:mauve)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
